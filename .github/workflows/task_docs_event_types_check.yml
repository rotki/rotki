name: Check event-types docs sync

on:
  pull_request:
    branches:
      - master
      - develop
      - bugfixes
    paths:
      - 'rotkehlchen/history/events/structures/types.py'
      - 'rotkehlchen/accounting/constants.py'
      - 'tools/scripts/generate_event_types_docs.py'
  push:
    branches:
      - master
      - develop
      - bugfixes
    paths:
      - 'rotkehlchen/history/events/structures/types.py'
      - 'rotkehlchen/accounting/constants.py'
      - 'tools/scripts/generate_event_types_docs.py'

permissions: { }

jobs:
  check-event-types-docs:
    name: 'Event types docs sync'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout main repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Load env
        uses: rotki/action-env@49f59e650cfdc8796c4ac6533ec044b190d83f9a  # v4.0.0
        with:
          env_file: .github/.env.ci

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --no-dev --group lint

      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: rotki/docs
          ref: main
          path: _docs
          persist-credentials: false

      - name: Check event-types.md is in sync
        run: |
          uv run python tools/scripts/generate_event_types_docs.py \
            --check _docs/usage-guides/event-types.md
